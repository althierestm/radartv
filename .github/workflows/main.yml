name: Atualizador de Lista IPTV

on:
  workflow_dispatch: # Permite que você rode manualmente se quiser
  schedule:
    - cron: '*/5 * * * *' # Clona e roda o script automaticamente a cada 5 minutos

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalar dependências de extração
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Executar o script de atualização
      run: python atualizar_lista.py

    - name: Salvar e atualizar o arquivo M3U no repositório
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add lista.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Grade de TV Atualizada" && git push)
