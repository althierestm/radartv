name: Atualizador de Lista IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Executar script de atualização
      run: python atualizar_lista.py

    - name: Salvar alterações no GitHub
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add lista.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Lista IPTV atualizada" && git push)
